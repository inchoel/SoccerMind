<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoccerMind ⚽🧠 — 월드컵 경기 예측</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>SoccerMind <span class="emoji">⚽🧠</span></h1>
      <p class="subtitle">실제 데이터 기반 월드컵 경기·토너먼트 예측</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="match">경기 예측</button>
      <button class="tab" data-tab="tournament">토너먼트 우승</button>
    </nav>

    <!-- 경기 예측 탭 -->
    <section id="tab-match" class="tab-panel">
      <form id="predict-form" class="form">
        <div class="team-inputs">
          <input id="team-a" list="teams" placeholder="예: 대한민국" autocomplete="off" required />
          <span class="vs">VS</span>
          <input id="team-b" list="teams" placeholder="예: 브라질" autocomplete="off" required />
        </div>
        <label class="opt-check">
          <input type="checkbox" id="opt-previews" />
          전문가 프리뷰 표시 <span class="opt-note">(실제 웹검색 · 다소 느림)</span>
        </label>
        <button type="submit" id="submit-btn">예측하기</button>
      </form>
      <div id="status" class="status" hidden></div>
      <section id="result" class="result" hidden></section>
    </section>

    <!-- 토너먼트 탭 -->
    <section id="tab-tournament" class="tab-panel" hidden>
      <form id="tournament-form" class="form">
        <label class="field-label">참가국 (쉼표로 구분, 2의 거듭제곱: 2·4·8·16·32)</label>
        <textarea id="tournament-teams" rows="3"
          placeholder="브라질, 아르헨티나, 프랑스, 스페인, 잉글랜드, 독일, 포르투갈, 네덜란드"></textarea>
        <button type="submit" id="tournament-btn">우승 예측</button>
      </form>
      <div id="t-status" class="status" hidden></div>
      <section id="t-result" class="result" hidden></section>
    </section>

    <datalist id="teams"></datalist>

    <footer>
      <a href="https://github.com/inchoel/SoccerMind" target="_blank" rel="noopener">GitHub</a>
      · 통계모델(Elo→스코어매트릭스) + LLM 하이브리드
    </footer>
  </main>
  <script src="/app.js"></script>
</body>
</html>
